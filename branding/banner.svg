    </g>
    <circle cx="780" cy="332" r="58" fill="#4FC3F7"/>
  </g>

  <!-- Painel direito começa em x=560, largura útil = 720px (com margem direita de 56px) -->
  <text x="560" y="288"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="104"
