# Fastforge (plus_flutter_distributor) — orquestra build + empacotamento.
# Rode com:  fastforge release --name <canal>
#
# Os make_config.yaml de cada formato vivem em <plataforma>/packaging/<formato>/
# (convenção fixa do Fastforge), não em packaging/<plataforma>/. Ver packaging/README.md.
output: dist/
variables:
  # Sobrescreva com env na CI; aqui ficam como referência/local.
  APPLE_SIGNING_IDENTITY: "Developer ID Application: Jacob Moura (U843T2P7A2)"

releases:
  # macOS: DMG universal (assinatura + notarização são passos manuais/CI à parte;
  # ver packaging/README.md — o Fastforge gera o DMG, o sign/notarize roda depois).
  - name: macos
    jobs:
      - name: dmg
        package:
          platform: macos
          target: dmg

  # Windows: instalador Inno Setup (.exe). NÃO buildável neste Mac — só CI.
  - name: windows
    jobs:
      - name: exe
        package:
          platform: windows
          target: exe

  # Linux: .deb e .rpm. NÃO buildável neste Mac — só CI (ubuntu-24.04 + rpmbuild).
  - name: linux
    jobs:
      - name: deb
        package:
          platform: linux
          target: deb
      - name: rpm
        package:
          platform: linux
          target: rpm
