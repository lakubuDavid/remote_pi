description: |
  Cockpit é o cliente desktop do Remote Pi: uma GUI multi-pane sobre o motor do
  Pi. Roda agentes (cada um um `pi --mode rpc`) e terminais lado a lado, com
  árvore de arquivos, worktrees por workspace e agendamento de daemons.
