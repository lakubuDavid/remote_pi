# DMG do Cockpit — layout da janela do instalador (ícone do app + atalho
# /Applications). O Fastforge usa `appdmg` (npm i -g appdmg) pra gerar.
#
# A assinatura (Developer ID) e a notarização NÃO acontecem aqui — são passos
# separados no runbook (packaging/README.md), aplicados sobre o .app antes do
# DMG e sobre o .dmg depois. No fluxo manual, o DMG é montado via hdiutil.
title: Remote Pi Cockpit
icon: ../../Runner/Assets.xcassets/AppIcon.appiconset/app_icon_512.png
icon-size: 120
window:
  size:
    width: 540
    height: 380
contents:
  - x: 150
    y: 200
    type: file
    path: Cockpit.app
  - x: 390
    y: 200
    type: link
    path: /Applications
