services:
  rp-s3:
    build: .
    image: jacobmoura7/rp-s3:latest
    container_name: rp-s3
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # O deploy path do CI (VPS_DEPLOY_PATH) montado como o produto "cockpit".
      # Host: /Users/flutterando/cockpit/data/latest.json
      # URL:  https://rp-s3.jacobmoura.work/downloads/cockpit/latest.json
      - /Users/flutterando/cockpit/data:/data/cockpit:ro
      # Manifest do app mobile (APK Android, plano 44).
      # URL: https://rp-s3.jacobmoura.work/downloads/app/latest.json
      - /Users/flutterando/app/data:/data/app:ro
